version: "3.9"

services:

  app:
    build: .
    container_name: microservice
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres.xviqxmxeixigejkrojwg
      SPRING_DATASOURCE_PASSWORD: "*goldenclear*"
      PORT: 8080
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"